<!DOCTYPE html>
<html>

<head>
    <title>AI Financial Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            width: 220px;
            height: 100%;
            background: #020617;
            padding: 20px;
        }

        .sidebar h3 {
            margin-bottom: 20px;
        }

        .sidebar p {
            cursor: pointer;
            margin: 10px 0;
            color: #94a3b8;
        }

        /* Main area */
        .container {
            margin-left: 240px;
            padding: 20px;
        }

        /* Chat box */
        .chat-box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Messages */
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .user {
            justify-content: flex-end;
        }

        .bot {
            justify-content: flex-start;
        }

        .text {
            padding: 10px;
            border-radius: 10px;
            max-width: 60%;
        }

        .user .text {
            background: #22c55e;
            color: black;
        }

        .bot .text {
            background: #334155;
        }

        /* Input */
        form {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        .typing {
            border-right: 2px solid white;
            overflow: hidden;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% {
                border-color: transparent
            }
        }

        @keyframes typing {
            from {
                width: 0
            }

            to {
                width: 100%
            }
        }


        .avatar {
            width: 30px;
            height: 30px;
            background: #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .user .avatar {
            background: #22c55e;
            color: black;
        }
    </style>
</head>

<script>
document.querySelectorAll('.typing').forEach(el => {
    let text = el.innerText;
    el.innerText = '';
    let i = 0;

    function type() {
        if (i < text.length) {
            el.innerText += text.charAt(i);
            i++;
            setTimeout(type, 5);
        }
    }

    type();
});
</script>

<body>

    <div class="sidebar">
        <h3>💬 Chats</h3>
        <p>🆕 New Chat</p>
    </div>

    <div class="container">

        <h1>💰 AI Finance Assistant</h1>

        <div class="chat-box">
            {% for msg in history %}
            <div class="message {{ msg.role }}">
                <div class="avatar">
                    {{ "U" if msg.role == "user" else "AI" }}
                </div>
                <div class="text {% if loop.last and msg.role == 'assistant' %}typing{% endif %}">
                    {{ msg.content }}
                </div>
            </div>
            {% endfor %}
        </div>

        <form action="/process" method="POST">
            <input type="text" name="query" placeholder="Type your message..." required>
            <button type="submit">Send</button>
        </form>

    </div>

</body>



</html>
